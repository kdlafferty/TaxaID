name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - TaxaTools
          - TaxaFetch
          - TaxaHabitat
          - TaxaMatch
          - TaxaLikely
          - TaxaExpect
          - TaxaAssign
          - TaxaFlag
          - TaxaWizard

    name: Check ${{ matrix.package }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RENV_CONFIG_AUTOLOADER_ENABLED: "false"
      NOT_CRAN: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Disable renv
        run: rm -f renv/activate.R .Rprofile

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev libharfbuzz-dev \
            libfribidi-dev pandoc

      - name: Install all dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("remotes", "rcmdcheck"))

          # Install order respects the TaxaID dependency chain
          all_pkgs <- c("TaxaTools", "TaxaFetch", "TaxaHabitat", "TaxaMatch",
                        "TaxaLikely", "TaxaExpect", "TaxaAssign", "TaxaFlag",
                        "TaxaWizard")
          target <- "${{ matrix.package }}"

          # Find which local packages the target needs
          desc <- read.dcf(file.path(target, "DESCRIPTION"))
          fields <- intersect(colnames(desc), c("Imports", "Depends", "Suggests"))
          all_deps_str <- paste(desc[, fields], collapse = ",")
          dep_names <- trimws(gsub("\\(.*?\\)", "", unlist(strsplit(all_deps_str, "[,\n]+"))))
          local_deps <- all_pkgs[all_pkgs %in% dep_names]

          # Install each local dep and its CRAN dependencies
          for (pkg in local_deps) {
            message("Installing CRAN deps for: ", pkg)
            remotes::install_deps(pkg, dependencies = TRUE, upgrade = "never")
            message("Installing local package: ", pkg)
            install.packages(pkg, repos = NULL, type = "source")
          }

          # Install the target package's own CRAN deps
          message("Installing CRAN deps for target: ", target)
          remotes::install_deps(target, dependencies = TRUE, upgrade = "never")

      - name: Check package
        shell: Rscript {0}
        run: |
          rcmdcheck::rcmdcheck(
            path = "${{ matrix.package }}",
            args = c("--no-manual", "--as-cran"),
            build_args = "--no-manual",
            error_on = "error"
          )
