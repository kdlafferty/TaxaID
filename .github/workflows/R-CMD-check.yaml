name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - TaxaTools
          - TaxaFetch
          - TaxaHabitat
          - TaxaMatch
          - TaxaLikely
          - TaxaExpect
          - TaxaAssign
          - TaxaFlag
          - TaxaWizard

    name: Check ${{ matrix.package }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RENV_CONFIG_AUTOLOADER_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Disable renv
        run: rm -f renv/activate.R .Rprofile

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Install local TaxaID dependencies BEFORE setup-r-dependencies,
      # then temporarily remove them from DESCRIPTION so pak doesn't
      # try to find them on CRAN.
      - name: Install local TaxaID dependencies and patch DESCRIPTION
        shell: Rscript {0}
        run: |
          all_pkgs <- c("TaxaTools", "TaxaFetch", "TaxaHabitat", "TaxaMatch",
                        "TaxaLikely", "TaxaExpect", "TaxaAssign", "TaxaFlag",
                        "TaxaWizard")
          target <- "${{ matrix.package }}"

          # Read DESCRIPTION to find local deps
          desc_path <- file.path(target, "DESCRIPTION")
          desc <- read.dcf(desc_path)
          fields <- intersect(colnames(desc), c("Imports", "Depends", "Suggests"))
          all_deps_str <- paste(desc[, fields], collapse = ",")
          dep_names <- trimws(gsub("\\(.*?\\)", "", unlist(strsplit(all_deps_str, "[,\n]+"))))
          local_deps <- all_pkgs[all_pkgs %in% dep_names]

          if (length(local_deps) > 0) {
            # Install CRAN deps of local packages first (recursively)
            install.packages("remotes")
            for (pkg in local_deps) {
              message("Installing CRAN deps for: ", pkg)
              remotes::install_deps(pkg, dependencies = TRUE, upgrade = "never")
            }
            # Install local packages in order
            for (pkg in local_deps) {
              message("Installing local package: ", pkg)
              install.packages(pkg, repos = NULL, type = "source")
            }

            # Patch DESCRIPTION: remove local packages from Imports/Suggests
            # so setup-r-dependencies won't try to resolve them from CRAN
            desc_text <- readLines(desc_path)
            for (lp in local_deps) {
              # Remove lines that are just the package name (with optional comma)
              desc_text <- desc_text[!grepl(paste0("^\\s*", lp, "\\s*(,|$)"), desc_text)]
            }
            writeLines(desc_text, desc_path)
          }

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: ${{ matrix.package }}
          extra-packages: any::rcmdcheck

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: ${{ matrix.package }}
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran")'
